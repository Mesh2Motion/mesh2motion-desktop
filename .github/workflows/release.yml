name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS signing: Apple Developer Program membership required — $99/year (~$8.25/month)
          # Provides a Developer ID certificate for signing + notarization via Xcode/altool
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          # Linux signing: no standard paid signing required; GPG signing is free
          - platform: ubuntu-22.04
            args: ''
          # Windows signing: Azure Trusted Signing ~$9.99/month, or OV/EV certificate ~$200-500/year from DigiCert/Sectigo etc.
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive   # grab mesh2motion-app sub-module code base


      # each "run" command starts fresh with the path, so we don't need to worry about cd'ing back to the root for each step
      - name: Pull latest submodule
        run: |
          cd mesh2motion-app
          git pull origin main

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >
            aarch64-apple-darwin,
            x86_64-apple-darwin

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Install and build frontend
        run: |
          cd mesh2motion-app
          npm install
          npm run build

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: '-'   # Temporary ad-hoc signing, no certificate needed (will probably have to change this later)
        with:
          tagName: ${{ github.ref_name }} # The tag that triggered the workflow, e.g. v1.2.0
          releaseName: 'Mesh2Motion Desktop ${{ github.ref_name }}' # e.g. Release v1.2.0
          releaseBody: |
            ## What do I pick?

            Download the file for your operating system:

            | Platform | File |
            |---|---|
            | Windows (installer) | `Mesh2Motion_${{ github.ref_name }}_x64-setup.exe` |
            | Windows (portable) | `Mesh2Motion_${{ github.ref_name }}_x64_portable.exe` |
            | macOS (Apple Silicon) | `Mesh2Motion_${{ github.ref_name }}_aarch64.dmg` |
            | macOS (Intel) | `Mesh2Motion_${{ github.ref_name }}_x64.dmg` |
            | Linux (Debian/Ubuntu) | `Mesh2Motion_${{ github.ref_name }}_amd64.deb` |
            | Linux (Universal) | `Mesh2Motion_${{ github.ref_name }}_amd64.AppImage` |

            ### Notes
            - **macOS** — right-click → Open on first launch to bypass Gatekeeper
            - **Linux AppImage** — run `chmod +x Mesh2Motion_${{ github.ref_name }}_amd64.AppImage` before launching
            - **Windows** — no installation required; if SmartScreen appears, click "More info" → "Run anyway"

            > **Note:** `Mesh2Motion app.tar.gz` files are used internally by the auto-updater and do not need to be downloaded manually.

          releaseDraft: true # review and publish artifacts manually
          prerelease: false  # Set true for alpha/beta tags
          args: ${{ matrix.args }} # Passes the --target flag per platform from the matrix
          projectPath: ./src-tauri # Path to the Tauri project, adjust if your Tauri project is in a subdirectory

      - name: Upload Windows portable EXE
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $assetName = "Mesh2Motion_${{ github.ref_name }}_x64_portable.exe"
          Copy-Item "src-tauri/target/release/mesh2motion.exe" $assetName
          gh release upload "${{ github.ref_name }}" $assetName --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}